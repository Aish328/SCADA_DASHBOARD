<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NHITS FORECAST</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080d14;
      --surface:   #0d1520;
      --surface2:  #111d2b;
      --border:    #1a2d42;
      --accent:    #00d4ff;
      --accent2:   #7b5ef8;
      --text:      #c8dff0;
      --muted:     #4a6a85;
      --danger:    #e74c3c;
      --warn:      #f39c12;
      --ok:        #2ecc71;
      --font-ui:   'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --radius:    6px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 15px; }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 4px);
    }

    /* ── Topbar ─────────────────────────────────────────── */
    .topbar {
      height: 48px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .breadcrumb { font-size: 11px; letter-spacing: 2px; color: var(--muted); font-family: var(--font-mono); }
    .breadcrumb span { color: var(--accent); }
    .tb-right { display: flex; align-items: center; gap: 12px; }
    .clock { font-family: var(--font-mono); font-size: 13px; color: var(--accent); letter-spacing: 1px; }
    .back-btn {
      font-family: var(--font-ui); font-size: 12px; letter-spacing: 1.5px; font-weight: 600;
      padding: 4px 14px; border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; border-radius: var(--radius); transition: all .2s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Section header ─────────────────────────────────── */
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .section-tag {
      font-size: 10px; letter-spacing: 3px; font-weight: 700; color: var(--accent);
      font-family: var(--font-mono); white-space: nowrap;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* ── Main layout ─────────────────────────────────────── */
    .main { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }

    /* ── Forecast panel ──────────────────────────────────── */
    .forecast-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .forecast-toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 12px 20px; background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .forecast-toolbar label {
      font-size: 10px; letter-spacing: 2px; color: var(--muted);
      font-family: var(--font-mono); white-space: nowrap;
    }
    .fc-select {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 10px; font-family: var(--font-mono); font-size: 11px;
      cursor: pointer; min-width: 180px;
    }
    .fc-select:focus { outline: none; border-color: var(--accent); }
    .fc-run-btn {
      font-family: var(--font-ui); font-size: 11px; letter-spacing: 1.5px;
      font-weight: 700; padding: 5px 16px;
      border: 1px solid var(--accent); background: rgba(0,212,255,.1);
      color: var(--accent); cursor: pointer; border-radius: var(--radius);
      transition: all .2s; white-space: nowrap;
    }
    .fc-run-btn:hover  { background: rgba(0,212,255,.22); }
    .fc-run-btn:disabled { opacity: .4; cursor: not-allowed; }
    .fc-meta {
      margin-left: auto; display: flex; align-items: center; gap: 14px;
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
    }
    .fc-meta-val { color: var(--accent); }

    /* ── Forecast body ───────────────────────────────────── */
    .forecast-body { padding: 16px 20px; }
    .forecast-kpi-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      margin-bottom: 16px;
    }
    .fc-kpi {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
    }
    .fc-kpi-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); font-family: var(--font-mono); }
    .fc-kpi-value { font-size: 22px; font-weight: 700; color: var(--text); font-family: var(--font-mono); line-height: 1.2; }
    .fc-kpi-unit  { font-size: 10px; color: var(--muted); }

    .forecast-chart-wrap { position: relative; height: 320px; }

    /* ── Per-feeder chips ────────────────────────────────── */
    .per-feeder-row {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
      margin-top: 14px;
    }
    .pf-chip {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; padding: 8px 10px; text-align: center;
    }
    .pf-chip-id    { font-size: 9px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 1px; }
    .pf-chip-name  { font-size: 10px; color: var(--text); margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pf-chip-value { font-size: 16px; font-weight: 700; color: var(--accent); font-family: var(--font-mono); }
    .pf-chip-unit  { font-size: 9px; color: var(--muted); }

    /* ── Loading / error ─────────────────────────────────── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--muted); font-family: var(--font-mono);
      font-size: 12px; letter-spacing: 2px;
    }
    .spinner {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite; margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.4 } }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="breadcrumb">DASHBOARD › SCADA › FORECAST › <span>NHITS GLOBAL</span></div>
  <div class="tb-right">
    <div class="clock" id="clock"></div>
    <button class="back-btn" onclick="history.back()">← BACK</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="section-header">
    <div class="section-tag">NHITS GLOBAL · ACTIVE LOAD FORECAST</div>
    <div class="section-line"></div>
  </div>

  <div class="forecast-panel">

    <!-- Toolbar -->
    <div class="forecast-toolbar">
      <label>SUBSTATION</label>
      <select class="fc-select" id="fcSub">
        <option value="">ALL SUBSTATIONS</option>
      </select>
      <label>FEEDER</label>
      <select class="fc-select" id="fcFeeder">
        <option value="">ALL FEEDERS (SUM)</option>
      </select>
      <button class="fc-run-btn" id="fcRunBtn" onclick="runForecast()">⚡ FORECAST</button>
      <div class="fc-meta">
        <span>METHOD: <span class="fc-meta-val" id="fcMethod">—</span></span>
        <span>HORIZON: <span class="fc-meta-val" id="fcHorizon">60 MIN</span></span>
        <span>LAST RUN: <span class="fc-meta-val" id="fcLastRun">—</span></span>
      </div>
    </div>

    <!-- KPI chips -->
    <div class="forecast-body">
      <div class="forecast-kpi-row">
        <div class="fc-kpi">
          <div class="fc-kpi-label">CURRENT LOAD</div>
          <div class="fc-kpi-value" id="fcCurrent">—</div>
          <div class="fc-kpi-unit">MW  (latest actual)</div>
        </div>
        <div class="fc-kpi">
          <div class="fc-kpi-label">FORECAST PEAK</div>
          <div class="fc-kpi-value" id="fcPeak">—</div>
          <div class="fc-kpi-unit">MW  (next 60 min)</div>
        </div>
        <div class="fc-kpi">
          <div class="fc-kpi-label">FORECAST AVG</div>
          <div class="fc-kpi-value" id="fcAvg">—</div>
          <div class="fc-kpi-unit">MW  (next 60 min)</div>
        </div>
        <div class="fc-kpi">
          <div class="fc-kpi-label">TREND</div>
          <div class="fc-kpi-value" id="fcTrend">—</div>
          <div class="fc-kpi-unit">vs current load</div>
        </div>
      </div>

      <!-- History + Forecast chart -->
      <div class="forecast-chart-wrap" id="forecastWrap">
        <div class="loading"><div class="spinner"></div>SELECT A FEEDER AND CLICK FORECAST</div>
      </div>

      <!-- Per-feeder breakdown -->
      <div class="per-feeder-row" id="perFeederRow" style="display:none"></div>
    </div>
  </div>

</div><!-- /main -->

<script>
// ── Clock ────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// ── Chart registry ───────────────────────────────────────
const charts = {};
function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}
function makeCanvas(wrapId) {
  const wrap = document.getElementById(wrapId);
  wrap.innerHTML = '';
  const c = document.createElement('canvas');
  c.style.width = '100%'; c.style.height = '100%';
  wrap.appendChild(c);
  return c;
}

// ── Filter state ─────────────────────────────────────────
let _fcFilters = { substation: null, feeder: null };
let _fcFiltersData = null;

async function initForecastFilters() {
  try {
    const r = await fetch('/filters/');
    _fcFiltersData = await r.json();
  } catch (e) {
    console.warn('Could not load /filters/', e);
    return;
  }
  const subSel = document.getElementById('fcSub');
  const fdSel  = document.getElementById('fcFeeder');

  (_fcFiltersData.substations || []).forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    subSel.appendChild(o);
  });

  const fillFeeders = () => {
    const all  = _fcFiltersData.feeders_by_substation || {};
    const list = _fcFilters.substation
      ? (all[_fcFilters.substation] || [])
      : Object.values(all).flat();
    fdSel.innerHTML = '<option value="">ALL FEEDERS (SUM)</option>' +
      list.map(f => `<option value="${f}">${f}</option>`).join('');
    _fcFilters.feeder = null;
  };
  fillFeeders();

  subSel.addEventListener('change', () => {
    _fcFilters.substation = subSel.value || null;
    fillFeeders();
  });
  fdSel.addEventListener('change', () => {
    _fcFilters.feeder = fdSel.value || null;
  });
}

// ── Error helper ─────────────────────────────────────────
function showErr(wrapId, msg) {
  const el = document.getElementById(wrapId);
  if (el) el.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:8px;padding:16px;">
    <div style="color:#e74c3c;font-family:var(--font-mono);font-size:11px;letter-spacing:1px;">⚠ ERROR</div>
    <div style="color:#4a6a85;font-family:var(--font-mono);font-size:10px;text-align:center;line-height:1.6;">${msg}</div>
  </div>`;
}

// ── Render forecast chart ─────────────────────────────────
function renderForecastChart(forecastData) {
  if (!forecastData || forecastData.error) {
    showErr('forecastWrap', forecastData?.error || 'Forecast unavailable.');
    return;
  }

  document.getElementById('fcMethod').textContent =
    (forecastData.method || '—').toUpperCase();
  document.getElementById('fcLastRun').textContent =
    forecastData.last_run
      ? new Date(forecastData.last_run).toLocaleTimeString('en-GB')
      : '—';
  document.getElementById('fcHorizon').textContent =
    (forecastData.horizon_minutes || 60) + ' MIN';

  const hist   = forecastData.history || {};
  const mwHist = hist.mw  || [];
  const mwFcst = forecastData.values || [];

  const currentLoad = mwHist.length ? mwHist[mwHist.length - 1] : null;
  const peak        = mwFcst.length ? Math.max(...mwFcst) : null;
  const avg         = mwFcst.length ? (mwFcst.reduce((a, b) => a + b, 0) / mwFcst.length) : null;
  const trend       = (currentLoad != null && peak != null)
    ? ((peak - currentLoad) / currentLoad * 100) : null;

  document.getElementById('fcCurrent').textContent = currentLoad != null ? currentLoad.toFixed(3) : '—';
  document.getElementById('fcPeak').textContent    = peak != null ? peak.toFixed(3) : '—';
  document.getElementById('fcAvg').textContent     = avg  != null ? avg.toFixed(3)  : '—';
  document.getElementById('fcTrend').textContent   = trend != null
    ? (trend >= 0 ? '▲ +' : '▼ ') + trend.toFixed(1) + '%' : '—';
  const trendEl = document.getElementById('fcTrend');
  if (trend != null) {
    trendEl.style.color = trend > 5 ? 'var(--danger)' : trend < -5 ? 'var(--ok)' : 'var(--warn)';
  }

  const histLabels = (hist.ds || []).map(t => t.slice(11, 16));
  const fcstLabels = (forecastData.horizon || []).map(t => t.slice(11, 16));
  const allLabels  = [...histLabels, ...fcstLabels];
  const histLine   = [...mwHist, ...Array(fcstLabels.length).fill(null)];
  const fcstLine   = [...Array(histLabels.length).fill(null), ...mwFcst];

  destroyChart('forecast');
  const c = makeCanvas('forecastWrap');
  charts['forecast'] = new Chart(c, {
    type: 'line',
    data: {
      labels: allLabels,
      datasets: [
        {
          label: 'Actual Load (MW)',
          data: histLine,
          borderColor: '#3498db', borderWidth: 1.8,
          pointRadius: 0, tension: 0.3, fill: false,
        },
        {
          label: 'NHITS Forecast (MW)',
          data: fcstLine,
          borderColor: '#00d4ff', borderWidth: 2.5,
          borderDash: [7, 4],
          pointRadius: 4, pointBackgroundColor: '#00d4ff',
          tension: 0.3,
          fill: { target: 'origin', above: 'rgba(0,212,255,0.05)' },
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: '#c8dff0', font: { family: 'Rajdhani', size: 12 }, boxWidth: 10 }
        },
        annotation: {
          annotations: {
            boundary: {
              type: 'line',
              xMin: histLabels.length - 1, xMax: histLabels.length - 1,
              borderColor: 'rgba(255,255,255,0.18)', borderWidth: 1.5, borderDash: [5, 5],
              label: {
                content: 'NOW →', display: true, position: 'start',
                color: 'rgba(255,255,255,0.35)',
                font: { family: 'Share Tech Mono', size: 9 },
              }
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#4a6a85', maxTicksLimit: 12, font: { family: 'Share Tech Mono', size: 10 } },
          grid: { color: '#1a2d42' }
        },
        y: {
          title: { display: true, text: 'Active Load (MW)', color: '#4a6a85', font: { family: 'Share Tech Mono', size: 10 } },
          ticks: { color: '#4a6a85', font: { family: 'Share Tech Mono', size: 10 } },
          grid: { color: '#1a2d42' }
        }
      }
    }
  });

  // Per-feeder chips
  const pfRow  = document.getElementById('perFeederRow');
  const pf     = forecastData.per_feeder || {};
  const pfKeys = Object.keys(pf);
  const ID_NAME = {
    EP_FD01: '11KV LUMAX',        EP_FD02: 'RMU1',
    ML_FD01: '11KV BHOSALE NAGAR', ML_FD02: '11KV KUBERA',
    ML_FD03: '11KV MALWADI HADAPSAR'
  };
  if (pfKeys.length > 1) {
    pfRow.style.display = 'grid';
    pfRow.innerHTML = pfKeys.map(uid => {
      const vals = pf[uid];
      const peak = vals.length ? Math.max(...vals).toFixed(3) : '—';
      return `<div class="pf-chip">
        <div class="pf-chip-id">${uid}</div>
        <div class="pf-chip-name">${ID_NAME[uid] || uid}</div>
        <div class="pf-chip-value">${peak}</div>
        <div class="pf-chip-unit">MW peak</div>
      </div>`;
    }).join('');
  } else {
    pfRow.style.display = 'none';
  }
}

// ── Run forecast ─────────────────────────────────────────
async function runForecast() {
  const btn = document.getElementById('fcRunBtn');
  btn.disabled = true;
  btn.textContent = '⟳ RUNNING…';

  const wrap = document.getElementById('forecastWrap');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>FORECASTING…</div>';
  document.getElementById('perFeederRow').style.display = 'none';

  const params = new URLSearchParams();
  if (_fcFilters.substation) params.set('substation', _fcFilters.substation);
  if (_fcFilters.feeder)     params.set('feeder',     _fcFilters.feeder);
  const qs = params.toString() ? '?' + params.toString() : '';

  try {
    const r = await fetch(`/ml/forecast${qs}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
      throw new Error(err.detail || err.error || `HTTP ${r.status}`);
    }
    const data = await r.json();
    renderForecastChart(data);
  } catch (e) {
    showErr('forecastWrap', 'Forecast failed: ' + e.message);
    console.error('Forecast error:', e);
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ FORECAST';
  }
}

// ── Init ─────────────────────────────────────────────────
initForecastFilters();
</script>
</body>
</html>
